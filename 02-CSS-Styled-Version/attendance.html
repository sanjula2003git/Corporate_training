<!DOCTYPE html>
<!-- PHASE 2 — HTML + CSS — Attendance Management. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance | Training Management Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">ABC Learning</div>
        <nav>
          <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="students.html">Students</a></li>
            <li><a href="trainers.html">Trainers</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a class="active" href="attendance.html">Attendance</a></li>
            <li><a href="certificates.html">Certificates</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="index.html">Logout</a></li>
          </ul>
        </nav>
      </aside>

      <div class="main">
        <header class="navbar">
          <h1>Attendance Management</h1>
          <span class="user">Welcome, Admin</span>
        </header>

        <div class="content">
          <div class="panel">
            <h2>Mark Attendance</h2>
            <form>
              <div class="form-grid" style="margin-bottom:1rem">
                <div class="field"><label>Course</label>
                  <select><option>React Fundamentals</option><option>Java Backend</option><option>Python Basics</option></select>
                </div>
                <div class="field"><label>Date</label><input type="date" /></div>
              </div>

              <div class="table-wrap">
                <table>
                  <thead><tr><th>Student Name</th><th>Present</th></tr></thead>
                  <tbody>
                    <tr><td>Ravi Kumar</td><td><input type="checkbox" checked /></td></tr>
                    <tr><td>Meera Nair</td><td><input type="checkbox" checked /></td></tr>
                    <tr><td>John Mathew</td><td><input type="checkbox" /></td></tr>
                  </tbody>
                </table>
              </div>

              <div style="margin-top:1rem">
                <button class="btn" type="submit">Save Attendance</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
