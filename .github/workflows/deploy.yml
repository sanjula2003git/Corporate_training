name: Deploy to GitHub Pages

# Runs on every push to main, and can be triggered manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build React app
        working-directory: 03-React-Version
        run: |
          npm ci
          npm run build

      - name: Assemble site (HTML + CSS + built React + landing page)
        run: |
          mkdir -p _site/01-HTML-Version _site/02-CSS-Styled-Version _site/03-React-Version
          cp index.html _site/index.html
          cp -r 01-HTML-Version/. _site/01-HTML-Version/
          cp -r 02-CSS-Styled-Version/. _site/02-CSS-Styled-Version/
          cp -r 03-React-Version/dist/. _site/03-React-Version/

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
